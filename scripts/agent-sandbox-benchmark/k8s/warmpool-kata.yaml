---
# warmpool-kata.yaml — SandboxWarmPool for Kata Containers (kata-qemu).
apiVersion: agents.x-k8s.io/v1alpha1
kind: SandboxWarmPool
metadata:
  name: warm-kata
spec:
  size: 5
  template:
    podTemplate:
      spec:
        runtimeClassName: kata-qemu
        containers:
          - name: agent
            image: ghcr.io/kubernetes-sigs/agent-sandbox/agent-runtime:v0.1.0
            resources:
              requests:
                cpu: "200m"
                memory: "256Mi"
              limits:
                cpu: "2000m"
                memory: "1Gi"
